<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}ChamaTI{% endblock %} · ChamaTI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="marca" href="{{ url_for('paginas.index') }}">Chama<span class="ponto">TI</span></a>
    <nav>
      {% if usuario.perfil == 'tecnico' %}
        <a href="{{ url_for('paginas.pagina_atendimento') }}" class="{{ 'ativo' if request.path == '/atendimento' }}">Atendimento</a>
        <a href="{{ url_for('paginas.pagina_abrir') }}" class="{{ 'ativo' if request.path == '/abrir' }}">Abrir chamado</a>
        <a href="{{ url_for('paginas.pagina_usuarios') }}" class="{{ 'ativo' if request.path == '/usuarios' }}">Usuários</a>
      {% else %}
        <a href="{{ url_for('paginas.pagina_abrir') }}" class="{{ 'ativo' if request.path == '/abrir' }}">Abrir chamado</a>
        <a href="{{ url_for('paginas.pagina_meus_chamados') }}" class="{{ 'ativo' if request.path == '/meus-chamados' }}">Meus chamados</a>
      {% endif %}
      <a href="{{ url_for('paginas.pagina_base') }}" class="{{ 'ativo' if request.path == '/base' }}">Base de conhecimento</a>
    </nav>
    <div class="usuario">
      <div>
        <div class="nome">{{ usuario.nome }}</div>
        <div class="perfil">{{ usuario.perfil }}</div>
      </div>
      <button class="btn btn-secundario btn-pequeno" id="btn-sair">Sair</button>
    </div>
  </header>

  <main class="container">
    {% block conteudo %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/comum.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
