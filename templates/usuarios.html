{% extends "base.html" %}
{% block titulo %}Usuários{% endblock %}

{% block conteudo %}
<div class="cabecalho-pagina">
  <h1>Usuários</h1>
  <p>Crie e consulte os acessos de colaboradores e técnicos.</p>
</div>

<div class="detalhe-grid">
  <div class="cartao">
    <h2 class="secao">Novo usuário</h2>
    <div class="aviso" id="aviso"></div>

    <form id="form-usuario" novalidate>
      <div class="campo" id="campo-nome">
        <label for="nome">Nome <span class="obrigatorio">*</span></label>
        <input type="text" id="nome" maxlength="80" placeholder="Ex.: João da Silva">
        <div class="mensagem-erro" data-erro="nome"></div>
      </div>

      <div class="campo" id="campo-email">
        <label for="email">E-mail <span class="obrigatorio">*</span></label>
        <input type="email" id="email" maxlength="120" placeholder="nome@uncisal.edu.br">
        <div class="mensagem-erro" data-erro="email"></div>
      </div>

      <div class="campo" id="campo-senha">
        <label for="senha">Senha <span class="obrigatorio">*</span>
          <span class="dica">(mínimo de 6 caracteres)</span></label>
        <input type="password" id="senha" placeholder="••••••••">
        <div class="mensagem-erro" data-erro="senha"></div>
      </div>

      <div class="campo" id="campo-perfil">
        <label for="perfil">Perfil <span class="obrigatorio">*</span></label>
        <select id="perfil">
          <option value="">Selecione...</option>
          <option value="colaborador">Colaborador</option>
          <option value="tecnico">Técnico</option>
        </select>
        <div class="mensagem-erro" data-erro="perfil"></div>
      </div>

      <div class="botoes">
        <button type="submit" class="btn btn-primario" id="btn-criar">Criar usuário</button>
      </div>
    </form>
  </div>

  <div class="cartao" style="padding:0; overflow:hidden">
    <h2 class="secao" style="padding:var(--esp-5) var(--esp-5) 0">Usuários cadastrados</h2>
    <table class="tabela" style="margin-top:var(--esp-3)">
      <thead>
        <tr><th>Nome</th><th>E-mail</th><th style="width:120px">Perfil</th></tr>
      </thead>
      <tbody id="corpo-usuarios"></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/usuarios.js') }}"></script>
{% endblock %}
